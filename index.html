<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>واجهة تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Tajawal", sans-serif; }
    body {
      background: #f3f3f7;
      min-height: 100vh;
      color: #2f3442;
    }
    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 16px 24px;
      display: flex;
      flex-direction: column;
    }
    .title {
      text-align: center;
      font-size: 33px;
      font-weight: 800;
      line-height: 1.5;
      color: #303647;
      margin-top: 6px;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 30px;
      padding: 26px 16px 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.03);
    }
    .desc {
      text-align: center;
      color: #4e5565;
      font-size: 17px;
      line-height: 1.9;
      margin-bottom: 20px;
      padding: 0 10px;
    }
    .field {
      height: 80px;
      background: #f4f4f8;
      border-radius: 26px;
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 1px solid transparent;
      margin-bottom: 16px;
    }
    .field:focus-within {
      border-color: #d8dde7;
      background: #f7f7fa;
    }
    .country {
      width: 116px;
      height: 100%;
      background: #efeff4;
      border-left: 1px solid #e4e7ee;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8a91a0;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .flag {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: linear-gradient(
        to bottom,
        #d73838 0%, #d73838 33.33%,
        #ffffff 33.33%, #ffffff 66.66%,
        #111111 66.66%, #111111 100%
      );
    }
    input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      height: 100%;
      padding: 0 22px;
      text-align: right;
      color: #555d6d;
      font-size: 21px;
    }
    input::placeholder { color: #727a8b; }
    .password {
      justify-content: space-between;
      padding: 0 8px;
    }
    .icon-box, .icon-btn {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: transparent;
      border: none;
    }
    .icon-btn { cursor: pointer; }
    .lock-svg { width: 28px; height: 34px; }
    .eye-svg { width: 28px; height: 28px; }
    .spacer {
      flex: 1;
      min-height: 420px;
    }
    .submit-wrap {
      margin-top: auto;
      padding-top: 14px;
    }
    .submit-btn {
      width: 100%;
      height: 84px;
      border: none;
      border-radius: 999px;
      background: #8ad5c1;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(138,213,193,.20);
      cursor: not-allowed;
      opacity: .55;
      transition: .2s ease;
    }
    .submit-btn.enabled {
      opacity: 1;
      cursor: pointer;
    }
    .notice {
      text-align: center;
      font-size: 12px;
      color: #7d8595;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <h1 class="title">تسجيل الدخول إلى حسابك</h1>

    <div class="card">
      <p class="desc">
        يرجى إدخال رقم الجوال وكلمة المرور الخاصة بك لتسجيل الدخول إلى حسابك.
      </p>

      <div class="field">
        <div class="country">
          <div class="flag"></div>
          <span>+964</span>
        </div>
        <input id="phone" type="text" inputmode="numeric" placeholder="رقم الجوال" />
      </div>

      <div class="field password">
        <div class="icon-box" aria-hidden="true">
          <svg class="lock-svg" viewBox="0 0 24 24" fill="none">
            <path d="M7.5 10V7.8C7.5 5.2 9.55 3 12 3C14.45 3 16.5 5.2 16.5 7.8V10"
                  stroke="#6F7787" stroke-width="2.1" stroke-linecap="round"/>
            <rect x="5.2" y="10" width="13.6" height="10.8" rx="2.8"
                  stroke="#6F7787" stroke-width="2.1" fill="none"/>
          </svg>
        </div>

        <input id="password" type="password" placeholder="كلمة المرور" />

        <button class="icon-btn" id="togglePassword" type="button" aria-label="إظهار كلمة المرور">
          <svg class="eye-svg" viewBox="0 0 24 24" fill="none">
            <path d="M2 12C3.9 8.7 7.3 6.5 12 6.5C16.7 6.5 20.1 8.7 22 12C20.1 15.3 16.7 17.5 12 17.5C7.3 17.5 3.9 15.3 2 12Z"
                  stroke="#6F7787" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" stroke="#6F7787" stroke-width="2"/>
            <path id="eyeSlash" d="M4 20L20 4" stroke="#6F7787" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="submit-wrap">
      <button id="submitBtn" class="submit-btn" type="button" disabled>تسجيل الدخول</button>
      <div class="notice">عرض تجريبي فقط — لا يتم إرسال أو حفظ أي بيانات.</div>
    </div>
  </div>

  <script>
    const phoneInput = document.getElementById("phone");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");
    const togglePassword = document.getElementById("togglePassword");
    const eyeSlash = document.getElementById("eyeSlash");

    let hidden = true;

    function validateForm() {
      const phoneFilled = phoneInput.value.trim().length > 0;
      const passwordFilled = passwordInput.value.trim().length > 0;
      const valid = phoneFilled && passwordFilled;

      submitBtn.disabled = !valid;
      submitBtn.classList.toggle("enabled", valid);
    }

    phoneInput.addEventListener("input", validateForm);
    passwordInput.addEventListener("input", validateForm);

    togglePassword.addEventListener("click", function () {
      hidden = !hidden;
      passwordInput.type = hidden ? "password" : "text";
      eyeSlash.style.display = hidden ? "block" : "none";
      togglePassword.setAttribute(
        "aria-label",
        hidden ? "إظهار كلمة المرور" : "إخفاء كلمة المرور"
      );
    });

    submitBtn.addEventListener("click", function () {
      if (!submitBtn.disabled) {
        alert("هذا نموذج واجهة فقط، ولا يقوم بإرسال أي بيانات.");
      }
    });
  </script>
</body>
</html>

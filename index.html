<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",sans-serif}

body{
  background:#f3f3f7;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.container{
  max-width:420px;
  margin:auto;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  padding:20px 16px 0;
}

.title{
  text-align:center;
  font-size:32px;
  font-weight:800;
  margin-bottom:25px;
  color:#2f3442;
}

.card{
  background:#fff;
  border-radius:30px;
  padding:25px 15px 20px;
}

.desc{
  text-align:center;
  font-size:17px;
  color:#555;
  margin-bottom:20px;
}

.input-box{
  height:78px;
  background:#f5f5f9;
  border-radius:26px;
  display:flex;
  align-items:center;
  overflow:hidden;
  margin-bottom:15px;
}

.country{
  width:110px;
  height:100%;
  background:#f1f1f6;
  border-left:1px solid #e8e8ee;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#8b92a3;
  font-weight:bold;
}

.flag{
  width:28px;
  height:28px;
  border-radius:50%;
  background:linear-gradient(
    to bottom,
    #d32f2f 0%,
    #d32f2f 33%,
    #fff 33%,
    #fff 66%,
    #000 66%,
    #000 100%
  );
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  padding:0 20px;
  font-size:20px;
  text-align:right;
}

.password{
  justify-content:space-between;
  padding:0 10px;
}

.icon{
  width:50px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.lock{
  width:24px;height:24px;border:2px solid #777;border-radius:4px;position:relative;
}
.lock:before{
  content:"";
  position:absolute;
  width:14px;height:10px;
  border:2px solid #777;
  border-bottom:none;
  border-radius:10px 10px 0 0;
  top:-10px;left:50%;transform:translateX(-50%);
}

.eye{
  width:26px;height:26px;cursor:pointer;
}

/* دکمه پایین */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#f3f3f7;
  padding:15px;
}

.btn{
  width:100%;
  max-width:420px;
  margin:auto;
  display:block;
  height:75px;
  border:none;
  border-radius:999px;
  background:#cfd4da;
  color:#fff;
  font-size:24px;
  font-weight:700;
  cursor:not-allowed;
  transition:0.2s;
}

/* وقتی فعال شد */
.btn.active{
  background:#8bd8c5;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(139,216,197,0.3);
}

</style>
</head>

<body>

<div class="container">

  <div class="title">تسجيل الدخول إلى حسابك</div>

  <div class="card">

    <div class="desc">
      يرجى إدخال رقم الجوال وكلمة المرور الخاصة بك لتسجيل الدخول إلى حسابك.
    </div>

    <div class="input-box">
      <div class="country">
        <div class="flag"></div>
        +964
      </div>
      <input id="phone" type="text" placeholder="رقم الجوال">
    </div>

    <div class="input-box password">
      <div class="icon"><div class="lock"></div></div>

      <input id="password" type="password" placeholder="كلمة المرور">

      <div class="icon">
        <svg id="eye" class="eye" viewBox="0 0 24 24" fill="none">
          <path d="M2 12C4 8 8 6 12 6C16 6 20 8 22 12C20 16 16 18 12 18C8 18 4 16 2 12Z" stroke="#777" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="#777" stroke-width="2"/>
          <line id="slash" x1="4" y1="20" x2="20" y2="4" stroke="#777" stroke-width="2"/>
        </svg>
      </div>
    </div>

  </div>

</div>

<!-- دکمه -->
<div class="bottom">
  <button id="btn" class="btn">تسجيل الدخول</button>
</div>

<script>
const phone = document.getElementById("phone");
const pass = document.getElementById("password");
const btn = document.getElementById("btn");
const eye = document.getElementById("eye");
const slash = document.getElementById("slash");

let hidden = true;

/* فعال شدن دکمه */
function check() {
  if (phone.value.trim() !== "" && pass.value.trim() !== "") {
    btn.classList.add("active");
    btn.disabled = false;
  } else {
    btn.classList.remove("active");
    btn.disabled = true;
  }
}

phone.addEventListener("input", check);
pass.addEventListener("input", check);

/* نمایش رمز */
eye.onclick = () => {
  hidden = !hidden;
  pass.type = hidden ? "password" : "text";
  slash.style.display = hidden ? "block" : "none";
};
</script>

</body>
</html>

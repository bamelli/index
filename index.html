<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tajawal", sans-serif;
    }

    body {
      background: #f4f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 420px;
      margin: auto;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 0;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      color: #2f3442;
      margin-top: 10px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .card {
      background: #fff;
      border-radius: 30px;
      padding: 25px 15px 20px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.03);
    }

    .desc {
      text-align: center;
      font-size: 17px;
      color: #505768;
      line-height: 1.9;
      margin-bottom: 20px;
    }

    .input-box {
      height: 78px;
      background: #f5f5f9;
      border-radius: 26px;
      display: flex;
      align-items: center;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .country {
      width: 110px;
      height: 100%;
      background: #f1f1f6;
      border-left: 1px solid #e8e8ee;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: bold;
      color: #8b92a3;
    }

    .flag {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(
        to bottom,
        #d32f2f 0%,
        #d32f2f 33%,
        #ffffff 33%,
        #ffffff 66%,
        #000000 66%,
        #000000 100%
      );
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 0 20px;
      font-size: 20px;
      text-align: right;
      color: #444;
    }

    input::placeholder {
      color: #7a8191;
    }

    .password {
      justify-content: space-between;
      padding: 0 10px;
    }

    .icon {
      width: 50px;
      text-align: center;
      color: #7a8191;
      font-size: 22px;
    }

    /* دکمه پایین */
    .bottom {
      margin-top: auto;
      padding: 20px 0 25px;
    }

    .btn {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 999px;
      background: #8bd8c5;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(139,216,197,0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">
    تسجيل الدخول إلى حسابك
  </div>

  <div class="card">
    <div class="desc">
      يرجى إدخال رقم الجوال وكلمة المرور الخاصة بك لتسجيل الدخول إلى حسابك.
    </div>

    <!-- شماره -->
    <div class="input-box">
      <div class="country">
        <div class="flag"></div>
        +964
      </div>
      <input type="text" placeholder="رقم الجوال">
    </div>

    <!-- رمز -->
    <div class="input-box password">
      <div class="icon">🔒</div>
      <input type="password" placeholder="كلمة المرور">
      <div class="icon">🎧</div>
    </div>

  </div>

  <!-- دکمه پایین -->
  <div class="bottom">
    <button class="btn">تسجيل الدخول</button>
  </div>

</div>

</body>
</html>

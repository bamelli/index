<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Tajawal",sans-serif;
}

body{
  background:#f3f3f7;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.container{
  width:100%;
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:24px 16px 120px;
}

.title{
  text-align:center;
  font-size:30px;
  font-weight:800;
  color:#2f3442;
  margin-bottom:22px;
  line-height:1.5;
}

.card{
  background:#fff;
  border-radius:28px;
  padding:22px 14px 18px;
}

.desc{
  text-align:center;
  font-size:15px;
  color:#555;
  line-height:1.8;
  margin-bottom:18px;
}

.input-box{
  height:64px;              /* کوچیک‌تر شد */
  background:#f5f5f9;
  border-radius:22px;
  display:flex;
  align-items:center;
  overflow:hidden;
  margin-bottom:12px;
}

.country{
  width:98px;
  height:100%;
  background:#f1f1f6;
  border-left:1px solid #e8e8ee;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  color:#8b92a3;
  font-size:16px;
  font-weight:700;
  flex-shrink:0;
}

.flag{
  width:26px;
  height:26px;
  border-radius:50%;
  background:linear-gradient(
    to bottom,
    #d32f2f 0%,
    #d32f2f 33%,
    #fff 33%,
    #fff 66%,
    #000 66%,
    #000 100%
  );
}

input{
  flex:1;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  padding:0 18px;
  font-size:18px;
  text-align:right;
  color:#444;
}

input::placeholder{
  color:#8b92a3;
}

.password{
  justify-content:space-between;
  padding:0 8px;
}

.icon{
  width:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.lock{
  width:22px;
  height:22px;
  border:2px solid #7c8494;
  border-radius:4px;
  position:relative;
}

.lock:before{
  content:"";
  position:absolute;
  width:12px;
  height:9px;
  border:2px solid #7c8494;
  border-bottom:none;
  border-radius:10px 10px 0 0;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
}

.eye{
  width:24px;
  height:24px;
  cursor:pointer;
}

.bottom{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  background:#f3f3f7;
  padding:14px 16px 18px;
}

.btn{
  width:100%;
  max-width:430px;
  margin:0 auto;
  display:block;
  height:72px;
  border:none;
  border-radius:999px;
  background:#cfd4da;
  color:#fff;
  font-size:22px;
  font-weight:700;
  cursor:not-allowed;
  transition:0.2s;
}

.btn.active{
  background:#8bd8c5;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(139,216,197,0.28);
}
</style>
</head>

<body>

<div class="container">
  <div class="title">تسجيل الدخول إلى حسابك</div>

  <div class="card">
    <div class="desc">
      يرجى إدخال رقم الجوال وكلمة المرور الخاصة بك لتسجيل الدخول إلى حسابك.
    </div>

    <div class="input-box">
      <div class="country">
        <div class="flag"></div>
        +964
      </div>
      <input id="phone" type="text" placeholder="رقم الجوال">
    </div>

    <div class="input-box password">
      <div class="icon"><div class="lock"></div></div>

      <input id="password" type="password" placeholder="كلمة المرور">

      <div class="icon">
        <svg id="eye" class="eye" viewBox="0 0 24 24" fill="none">
          <path d="M2 12C4 8 8 6 12 6C16 6 20 8 22 12C20 16 16 18 12 18C8 18 4 16 2 12Z" stroke="#777" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="#777" stroke-width="2"/>
          <line id="slash" x1="4" y1="20" x2="20" y2="4" stroke="#777" stroke-width="2"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <button id="btn" class="btn" disabled>تسجيل الدخول</button>
</div>

<script>
const phone = document.getElementById("phone");
const pass = document.getElementById("password");
const btn = document.getElementById("btn");
const eye = document.getElementById("eye");
const slash = document.getElementById("slash");

let hidden = true;

function check() {
  if (phone.value.trim() !== "" && pass.value.trim() !== "") {
    btn.classList.add("active");
    btn.disabled = false;
  } else {
    btn.classList.remove("active");
    btn.disabled = true;
  }
}

phone.addEventListener("input", check);
pass.addEventListener("input", check);

eye.onclick = () => {
  hidden = !hidden;
  pass.type = hidden ? "password" : "text";
  slash.style.display = hidden ? "block" : "none";
};
</script>

</body>
</html>

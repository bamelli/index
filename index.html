<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Tajawal",sans-serif;
}

body{
  background:#f3f3f7;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  padding:20px 16px 18px;
}

.title{
  text-align:center;
  font-size:33px;
  font-weight:800;
  color:#2f3442;
  line-height:1.5;
  margin-top:4px;
  margin-bottom:22px;
}

.card{
  background:#ffffff;
  border-radius:30px;
  padding:28px 16px 22px;
  box-shadow:0 2px 8px rgba(0,0,0,0.02);
}

.desc{
  text-align:center;
  font-size:17px;
  color:#505768;
  line-height:1.9;
  margin-bottom:22px;
  padding:0 10px;
}

.input-box{
  width:100%;
  height:96px; /* کشیده‌تر */
  background:#f4f4f8;
  border-radius:28px;
  display:flex;
  align-items:center;
  overflow:hidden;
  margin-bottom:18px;
}

.country{
  width:122px;
  height:100%;
  background:#f0f0f5;
  border-left:1px solid #e7e7ee;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#8b92a3;
  font-size:20px;
  font-weight:700;
  flex-shrink:0;
}

.flag{
  width:31px;
  height:31px;
  border-radius:50%;
  border:1px solid #dcdcdc;
  background:linear-gradient(
    to bottom,
    #dc3a35 0%,
    #dc3a35 33.33%,
    #ffffff 33.33%,
    #ffffff 66.66%,
    #111111 66.66%,
    #111111 100%
  );
}

input{
  flex:1;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  padding:0 22px;
  font-size:21px;
  color:#596173;
  text-align:right;
}

input::placeholder{
  color:#6f7788;
}

.password{
  justify-content:space-between;
  padding:0 10px;
}

.icon{
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

/* آیکن قفل */
.lock{
  width:25px;
  height:19px;
  border:2.2px solid #7b8394;
  border-radius:5px;
  position:relative;
}
.lock:before{
  content:"";
  position:absolute;
  width:13px;
  height:10px;
  border:2.2px solid #7b8394;
  border-bottom:none;
  border-radius:12px 12px 0 0;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
}

/* آیکن سمت چپ شبیه عکس */
.headset{
  position:relative;
  width:26px;
  height:20px;
}
.headset:before{
  content:"";
  position:absolute;
  width:18px;
  height:10px;
  border:2.2px solid #7b8394;
  border-bottom:none;
  border-radius:14px 14px 0 0;
  top:0;
  left:50%;
  transform:translateX(-50%);
}
.headset:after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(#7b8394,#7b8394) left 1px top 10px / 4px 8px no-repeat,
    linear-gradient(#7b8394,#7b8394) right 1px top 10px / 4px 8px no-repeat;
}

/* فاصله تا دکمه پایین */
.spacer{
  flex:1;
  min-height:420px;
}

.bottom{
  padding-top:10px;
}

.btn{
  width:100%;
  height:84px;
  border:none;
  border-radius:999px;
  background:#cfd5d8;
  color:#ffffff;
  font-size:28px;
  font-weight:700;
  cursor:not-allowed;
  opacity:.75;
  transition:.2s;
}

.btn.active{
  background:#88d5c1;
  opacity:1;
  cursor:pointer;
  box-shadow:0 10px 18px rgba(136,213,193,.22);
}
</style>
</head>
<body>

<div class="container">
  <div class="title">تسجيل الدخول إلى حسابك</div>

  <div class="card">
    <div class="desc">
      يرجى إدخال رقم الجوال وكلمة المرور الخاصة بك لتسجيل الدخول إلى حسابك.
    </div>

    <div class="input-box">
      <div class="country">
        <div class="flag"></div>
        <span>+964</span>
      </div>
      <input id="phone" type="text" placeholder="رقم الجوال">
    </div>

    <div class="input-box password">
      <div class="icon"><div class="lock"></div></div>
      <input id="password" type="password" placeholder="كلمة المرور">
      <div class="icon"><div class="headset"></div></div>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="bottom">
    <button id="btn" class="btn" type="button" disabled>تسجيل الدخول</button>
  </div>
</div>

<script>
const phone = document.getElementById("phone");
const password = document.getElementById("password");
const btn = document.getElementById("btn");

function checkInputs() {
  const ok = phone.value.trim() !== "" && password.value.trim() !== "";
  btn.disabled = !ok;
  btn.classList.toggle("active", ok);
}

phone.addEventListener("input", checkInputs);
password.addEventListener("input", checkInputs);

btn.addEventListener("click", function () {
  if (!btn.disabled) {
    alert("هذا مجرد نموذج عرض للواجهة.");
  }
});
</script>

</body>
</html>
